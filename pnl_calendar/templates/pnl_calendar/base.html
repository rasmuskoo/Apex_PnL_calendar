<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PnL Calendar</title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/pnl_calendar/css/styles.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="/static/pnl_calendar/js/app.js"></script>
</head>
<body>
<header class="container-fluid topbar">
  <nav>
    <ul>
      <li><strong><a href="/">Apex Trader Funding PnL</a></strong></li>
    </ul>
    <ul>
      <li><a class="settings-link" href="{% url 'pnl_calendar:settings' %}" title="Settings">&#9881;</a></li>
    </ul>
  </nav>
</header>
<main class="container">
  {% if messages %}
  <section>
    {% for message in messages %}
    <article class="message {{ message.tags }}">{{ message }}</article>
    {% endfor %}
  </section>
  {% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
