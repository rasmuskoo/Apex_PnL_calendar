<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PnL Calendar</title>
  <script>
    (function () {
      const saved = localStorage.getItem("pnl-theme");
      const theme = saved === "light" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/sf-pro-display">
  <link rel="stylesheet" href="/static/pnl_calendar/css/styles.css?v=20260403b">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="/static/pnl_calendar/js/app.js"></script>
</head>
<body>
  <div class="app-bg" aria-hidden="true"></div>
  <header class="app-chrome">
    <nav class="topbar">
      <a class="brand-lockup" href="/" aria-label="Go to dashboard">
        <span class="brand-mark">◉</span>
        <span class="brand-text">Apex Trader Funding PnL</span>
      </a>
      <div class="topbar-actions">
        <button
          type="button"
          class="icon-btn"
          title="Settings"
          aria-label="Open settings"
          hx-get="{% url 'pnl_calendar:settings' %}"
          hx-target="#settings-modal-content"
          hx-swap="innerHTML"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.3 2h3.4l.4 2.2c.5.2 1 .4 1.5.6l1.9-1.1 2.4 2.4-1.1 1.9c.3.5.5 1 .6 1.5l2.2.4v3.4l-2.2.4c-.1.5-.3 1-.6 1.5l1.1 1.9-2.4 2.4-1.9-1.1c-.5.3-1 .5-1.5.6l-.4 2.2h-3.4l-.4-2.2c-.5-.1-1-.3-1.5-.6l-1.9 1.1-2.4-2.4 1.1-1.9c-.2-.5-.4-1-.6-1.5L2 13.3V9.9l2.2-.4c.2-.5.4-1 .6-1.5L3.7 6.1l2.4-2.4L8 4.8c.5-.2 1-.4 1.5-.6L10.3 2Z"></path>
            <circle cx="12" cy="11.6" r="2.6"></circle>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <main class="app-shell">
    {% if messages %}
    <section class="message-stack">
      {% for message in messages %}
      <article class="message {{ message.tags }}">{{ message }}</article>
      {% endfor %}
    </section>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <dialog id="settings-modal" class="settings-modal">
    <div class="settings-modal-content">
      <div id="settings-modal-content"></div>
    </div>
  </dialog>
</body>
</html>
